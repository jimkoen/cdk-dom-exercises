<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Type-Safe Event Delegation</title>
    <style>
        .list-container { padding: 20px; border: 2px solid #333; }
        .list-item { margin: 10px 0; padding: 10px; background: #f0f0f0; display: flex; justify-content: space-between; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
<h2>Event Delegation Arena</h2>

<!-- We will attach ONE listener to this container -->
<div id="container" class="list-container">
    <div class="list-item">
        <span>Item 1</span>
        <button class="action-btn" data-action="delete"><strong>X</strong> Delete</button>
    </div>
    <div class="list-item">
        <span>Item 2</span>
        <button class="action-btn" data-action="delete"><strong>X</strong> Delete</button>
    </div>
</div>

<div style="margin-top: 20px;">
    <button id="add-btn">Add New Row (Dynamically)</button>
    <button id="cleanup-btn">Stop Listening (Teardown)</button>
</div>

<script type="module" src="./index.ts"></script>
</body>
</html>
